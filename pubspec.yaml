name: aws_ivs_realtime
description: >
  Flutter plugin for Amazon IVS Real-Time (Stages): native stage video grid,
  optional SigV4 control-plane helpers, and IVS Chat WebSocket session utilities.
version: 0.1.1
homepage: https://github.com/vipulbansal/aws_ivs_realtime
repository: https://github.com/vipulbansal/aws_ivs_realtime
issue_tracker: https://github.com/vipulbansal/aws_ivs_realtime/issues
publisher: https://vipulflutter.dev

environment:
  sdk: ^3.11.5
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^12.0.1
  http: ^1.6.0
  aws_common: ^0.7.13
  aws_signature_v4: ^0.6.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.aws.ivs_realtime
        pluginClass: AwsIvsRealtimePlugin
      ios:
        pluginClass: AwsIvsRealtimePlugin
